name: Build and Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-14
            cmake_config: RelWithDebInfo

          - name: Windows
            os: windows-2022
            cmake_generator: "Visual Studio 17 2022"
            cmake_config: RelWithDebInfo

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── macOS: tests only (libobs not required) ───────────────────────────
      - name: Install test dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install googletest

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.cmake_config }} \
            -DGTEST_ROOT=$(brew --prefix googletest)

      # ── Windows: tests only ───────────────────────────────────────────────
      - name: Install test dependencies (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install gtest:x64-windows
        shell: pwsh

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -G "${{ matrix.cmake_generator }}" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows
        shell: pwsh

      # ── Build & test ──────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config ${{ matrix.cmake_config }} --parallel

      - name: Run unit tests (macOS)
        if: runner.os == 'macOS'
        run: ctest --test-dir build --output-on-failure -C ${{ matrix.cmake_config }}

      - name: Run unit tests (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build --output-on-failure -C ${{ matrix.cmake_config }}
        shell: pwsh
