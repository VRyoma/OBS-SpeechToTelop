name: Build and Test

on:
  push:
    branches: [main]
  pull_request:

env:
  OBS_VERSION: '30.1.2'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-14
            cmake_generator: Xcode
            cmake_config: RelWithDebInfo

          - name: Windows
            os: windows-2022
            cmake_generator: "Visual Studio 17 2022"
            cmake_config: RelWithDebInfo

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache whisper.cpp
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: whisper-v1.7.3-${{ runner.os }}

      # ── macOS: build libobs from source ───────────────────────────────────
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake googletest curl pkg-config

      - name: Checkout OBS Studio source (macOS)
        if: runner.os == 'macOS'
        uses: actions/checkout@v4
        with:
          repository: obsproject/obs-studio
          ref: ${{ env.OBS_VERSION }}
          path: obs-studio
          fetch-depth: 1
          submodules: false

      - name: Cache OBS build (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        id: obs-cache-mac
        with:
          path: |
            obs-build
            obs-install
          key: obs-${{ env.OBS_VERSION }}-macos-libobs

      - name: Build libobs (macOS)
        if: runner.os == 'macOS' && steps.obs-cache-mac.outputs.cache-hit != 'true'
        run: |
          cmake -B obs-build -S obs-studio \
            -G Xcode \
            -DENABLE_BROWSER=OFF \
            -DENABLE_WEBSOCKET=OFF \
            -DENABLE_UI=OFF \
            -DENABLE_SCRIPTING=OFF \
            -DENABLE_VLC=OFF \
            -DENABLE_PLUGINS=OFF \
            -DENABLE_FRONTEND_API=OFF \
            -DENABLE_HEVC=OFF \
            -DENABLE_VIRTUALCAM=OFF
          cmake --build obs-build --config Release --target libobs --parallel
          cmake --install obs-build --config Release --prefix obs-install

      - name: Locate libobs cmake config (macOS)
        if: runner.os == 'macOS'
        run: |
          cfg=$(find obs-install obs-build -name "libobsConfig.cmake" 2>/dev/null | head -1)
          if [ -n "$cfg" ]; then
            echo "LIBOBS_DIR=$(dirname "$cfg")" >> "$GITHUB_ENV"
          else
            echo "::warning::libobsConfig.cmake not found — building without OBS headers"
          fi

      # ── Windows dependencies ─────────────────────────────────────────────
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install gtest:x64-windows curl:x64-windows
        shell: pwsh

      - name: Checkout OBS Studio source (Windows)
        if: runner.os == 'Windows'
        uses: actions/checkout@v4
        with:
          repository: obsproject/obs-studio
          ref: ${{ env.OBS_VERSION }}
          path: obs-studio
          fetch-depth: 1
          submodules: false

      - name: Cache OBS build (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        id: obs-cache-win
        with:
          path: |
            obs-build
            obs-install
          key: obs-${{ env.OBS_VERSION }}-windows-libobs

      - name: Build libobs (Windows)
        if: runner.os == 'Windows' && steps.obs-cache-win.outputs.cache-hit != 'true'
        run: |
          cmake -B obs-build -S obs-studio `
            -G "Visual Studio 17 2022" -A x64 `
            -DENABLE_BROWSER=OFF `
            -DENABLE_WEBSOCKET=OFF `
            -DENABLE_UI=OFF `
            -DENABLE_SCRIPTING=OFF `
            -DENABLE_VLC=OFF `
            -DENABLE_PLUGINS=OFF `
            -DENABLE_FRONTEND_API=OFF `
            -DENABLE_HEVC=OFF `
            -DENABLE_QSV11=OFF `
            -DENABLE_NVENC=OFF `
            -DENABLE_DECKLINK=OFF `
            -DENABLE_VIRTUALCAM=OFF
          cmake --build obs-build --config Release --target libobs --parallel
          cmake --install obs-build --config Release --prefix obs-install
        shell: pwsh

      - name: Locate libobs cmake config (Windows)
        if: runner.os == 'Windows'
        run: |
          $cfg = Get-ChildItem -Path obs-install,obs-build -Recurse -Filter libobsConfig.cmake `
                   -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($cfg) {
            echo "LIBOBS_DIR=$($cfg.DirectoryName)" >> $env:GITHUB_ENV
            Write-Host "Found libobsConfig.cmake at $($cfg.DirectoryName)"
          } else {
            Write-Host "::warning::libobsConfig.cmake not found"
          }
        shell: pwsh

      # ── Configure ────────────────────────────────────────────────────────
      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build -G "${{ matrix.cmake_generator }}" \
            -DCMAKE_BUILD_TYPE=${{ matrix.cmake_config }} \
            -DGTEST_ROOT=$(brew --prefix googletest) \
            ${LIBOBS_DIR:+-Dlibobs_DIR="$LIBOBS_DIR"}

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -G "${{ matrix.cmake_generator }}" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            ${env:LIBOBS_DIR ? "-Dlibobs_DIR=`"$env:LIBOBS_DIR`"" : ""}
        shell: pwsh

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config ${{ matrix.cmake_config }} --parallel

      # ── Unit tests (pure C++, no OBS required) ────────────────────────────
      - name: Run unit tests (macOS)
        if: runner.os == 'macOS'
        run: ctest --build-dir build --output-on-failure -C ${{ matrix.cmake_config }}

      - name: Run unit tests (Windows)
        if: runner.os == 'Windows'
        run: ctest --build-dir build --output-on-failure -C ${{ matrix.cmake_config }}
        shell: pwsh
