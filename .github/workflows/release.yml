name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  OBS_VERSION: '30.1.2'

jobs:
  # ─── Build binaries ─────────────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macOS-arm64
            artifact: SpeechToTelop-macOS-arm64

          - os: windows-2022
            name: Windows-x64
            artifact: SpeechToTelop-Windows-x64

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── FetchContent cache (whisper.cpp — both platforms) ──────────────────
      - name: Cache whisper.cpp
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: whisper-v1.7.3-${{ runner.os }}

      # ═══════════════════════════════════════════════════════════════════════
      # macOS
      # ═══════════════════════════════════════════════════════════════════════
      - name: Install OBS + deps (macOS)
        if: runner.os == 'macOS'
        run: |
          # Use pre-installed cmake (3.x) — obs-studio 30.1.2 is not compatible with cmake 4.x
          brew install googletest curl

      - name: Locate libobs cmake config (macOS)
        if: runner.os == 'macOS'
        run: |
          OBS_PREFIX="$(brew --prefix obs-studio)"
          LIBOBS_DIR=$(find "$OBS_PREFIX" -name "libobsConfig.cmake" 2>/dev/null \
                         | head -1 | xargs -I{} dirname {} || echo "")
          echo "LIBOBS_DIR=$LIBOBS_DIR" >> "$GITHUB_ENV"
          echo "GTEST_ROOT=$(brew --prefix googletest)" >> "$GITHUB_ENV"

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            ${LIBOBS_DIR:+-Dlibobs_DIR="$LIBOBS_DIR"} \
            -DGTEST_ROOT="$GTEST_ROOT"

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: cmake --build build --config Release --parallel

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PKG="${{ matrix.artifact }}-${VERSION}"
          mkdir -p "${PKG}/bin" "${PKG}/data/locale"
          cp build/SpeechToTelop.dylib "${PKG}/bin/"
          cp data/locale/en-US.ini     "${PKG}/data/locale/"
          zip -r "${PKG}.zip" "${PKG}"

      # ═══════════════════════════════════════════════════════════════════════
      # Windows — build libobs from source then build plugin against it
      # ═══════════════════════════════════════════════════════════════════════
      - name: Checkout OBS Studio source (Windows)
        if: runner.os == 'Windows'
        uses: actions/checkout@v4
        with:
          repository: obsproject/obs-studio
          ref: ${{ env.OBS_VERSION }}
          path: obs-studio
          fetch-depth: 1
          submodules: false   # submodules not needed for libobs-only build

      - name: Cache OBS build (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        id: obs-cache
        with:
          path: |
            obs-build
            obs-install
          key: obs-${{ env.OBS_VERSION }}-windows-libobs

      - name: Build libobs (Windows)
        if: runner.os == 'Windows' && steps.obs-cache.outputs.cache-hit != 'true'
        run: |
          cmake -B obs-build -S obs-studio `
            -G "Visual Studio 17 2022" -A x64 `
            -DENABLE_BROWSER=OFF `
            -DENABLE_WEBSOCKET=OFF `
            -DENABLE_UI=OFF `
            -DENABLE_SCRIPTING=OFF `
            -DENABLE_VLC=OFF `
            -DENABLE_PLUGINS=OFF `
            -DENABLE_FRONTEND_API=OFF `
            -DENABLE_HEVC=OFF `
            -DENABLE_QSV11=OFF `
            -DENABLE_NVENC=OFF `
            -DENABLE_DECKLINK=OFF `
            -DENABLE_VIRTUALCAM=OFF
          cmake --build obs-build --config Release --target libobs --parallel
          cmake --install obs-build --config Release --prefix obs-install
        shell: pwsh

      - name: Install curl + GTest (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install curl:x64-windows gtest:x64-windows
        shell: pwsh

      - name: Locate libobs cmake config (Windows)
        if: runner.os == 'Windows'
        run: |
          $cfg = Get-ChildItem -Path obs-install -Recurse -Filter libobsConfig.cmake `
                   -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $cfg) {
            # Fallback: search build tree
            $cfg = Get-ChildItem -Path obs-build -Recurse -Filter libobsConfig.cmake `
                     -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($cfg) {
            echo "LIBOBS_DIR=$($cfg.DirectoryName)" >> $env:GITHUB_ENV
            Write-Host "Found libobsConfig.cmake at $($cfg.DirectoryName)"
          } else {
            Write-Error "Could not locate libobsConfig.cmake"
          }
        shell: pwsh

      - name: Configure plugin (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -Dlibobs_DIR="$env:LIBOBS_DIR" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows
        shell: pwsh

      - name: Build plugin (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --parallel
        shell: pwsh

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          $version = $env:GITHUB_REF_NAME
          $pkg = "${{ matrix.artifact }}-${version}"
          New-Item -ItemType Directory -Force "${pkg}\bin\64bit" | Out-Null
          New-Item -ItemType Directory -Force "${pkg}\data\locale" | Out-Null
          Copy-Item "build\Release\SpeechToTelop.dll" "${pkg}\bin\64bit\"
          Copy-Item "data\locale\en-US.ini" "${pkg}\data\locale\"
          Compress-Archive -Path $pkg -DestinationPath "${pkg}.zip"
        shell: pwsh

      # ── Upload artifact to share with release job ──────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.ref_name }}
          path: "*.zip"

  # ─── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          # Determine if pre-release (any tag containing a hyphen, e.g. v1.0.0-beta.1)
          PRERELEASE=""
          [[ "$VERSION" == *-* ]] && PRERELEASE="--prerelease"

          gh release create "$VERSION" *.zip \
            --repo "$GITHUB_REPOSITORY" \
            --title "SpeechToTelop $VERSION" \
            --generate-notes \
            $PRERELEASE \
            --notes "## インストール手順

          ### macOS
          1. \`SpeechToTelop-macOS-arm64-${VERSION}.zip\` をダウンロード
          2. \`bin/SpeechToTelop.dylib\` → \`~/Library/Application Support/obs-studio/plugins/SpeechToTelop/bin/\`
          3. \`data/\` → \`~/Library/Application Support/obs-studio/plugins/SpeechToTelop/data/\`

          ### Windows
          1. \`SpeechToTelop-Windows-x64-${VERSION}.zip\` をダウンロード
          2. \`bin\\64bit\\SpeechToTelop.dll\` → \`%APPDATA%\\obs-studio\\plugins\\SpeechToTelop\\bin\\64bit\\\`
          3. \`data\\\` → \`%APPDATA%\\obs-studio\\plugins\\SpeechToTelop\\data\\\`

          > モデルは初回起動時に自動ダウンロードされます（baseモデル: 約142MB）。"
