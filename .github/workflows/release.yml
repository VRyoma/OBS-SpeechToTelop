name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  OBS_VERSION: '30.1.2'
  # obs-deps version matching obs-studio 30.1.2 (see buildspec.json in obs-studio repo)
  OBS_DEPS_VERSION: '2024-01-25'

jobs:
  # ─── Build binaries ─────────────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macOS-arm64
            artifact: SpeechToTelop-macOS-arm64

          - os: windows-2022
            name: Windows-x64
            artifact: SpeechToTelop-Windows-x64

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache whisper.cpp
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: whisper-v1.7.3-${{ runner.os }}

      # ═══════════════════════════════════════════════════════════════════════
      # macOS — build libobs from source with pre-installed cmake (3.x)
      # Note: obs-studio 30.1.2 is incompatible with cmake 4.x; do NOT
      #       install cmake via brew before the obs-build step.
      # ═══════════════════════════════════════════════════════════════════════
      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: brew install googletest curl

      - name: Checkout OBS Studio source (macOS)
        if: runner.os == 'macOS'
        uses: actions/checkout@v4
        with:
          repository: obsproject/obs-studio
          ref: ${{ env.OBS_VERSION }}
          path: obs-studio
          fetch-depth: 1
          submodules: false

      - name: Cache OBS build (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        id: obs-cache-mac
        with:
          path: |
            obs-build
            obs-install
          key: obs-${{ env.OBS_VERSION }}-macos-libobs

      - name: Build libobs (macOS)
        if: runner.os == 'macOS' && steps.obs-cache-mac.outputs.cache-hit != 'true'
        run: |
          cmake -B obs-build -S obs-studio \
            -G Xcode \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DENABLE_BROWSER=OFF \
            -DENABLE_WEBSOCKET=OFF \
            -DENABLE_UI=OFF \
            -DENABLE_SCRIPTING=OFF \
            -DENABLE_VLC=OFF \
            -DENABLE_PLUGINS=OFF \
            -DENABLE_FRONTEND_API=OFF \
            -DENABLE_HEVC=OFF \
            -DENABLE_VIRTUALCAM=OFF
          cmake --build obs-build --config Release --target libobs --parallel
          cmake --install obs-build --config Release --prefix obs-install

      - name: Locate libobs cmake config (macOS)
        if: runner.os == 'macOS'
        run: |
          cfg=$(find obs-install obs-build -name "libobsConfig.cmake" 2>/dev/null | head -1)
          if [ -n "$cfg" ]; then
            echo "LIBOBS_DIR=$(dirname "$cfg")" >> "$GITHUB_ENV"
          else
            echo "::error::libobsConfig.cmake not found"
            exit 1
          fi

      - name: Configure plugin (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build \
            -G Xcode \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_BUILD_TYPE=Release \
            -Dlibobs_DIR="$LIBOBS_DIR" \
            -DGTEST_ROOT=$(brew --prefix googletest)

      - name: Build plugin (macOS)
        if: runner.os == 'macOS'
        run: cmake --build build --config Release --parallel

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PKG="${{ matrix.artifact }}-${VERSION}"
          mkdir -p "${PKG}/bin" "${PKG}/data/locale"
          cp build/Release/SpeechToTelop.dylib "${PKG}/bin/"
          cp data/locale/en-US.ini "${PKG}/data/locale/"
          zip -r "${PKG}.zip" "${PKG}"

      # ═══════════════════════════════════════════════════════════════════════
      # Windows — obs-deps + build libobs from source
      # ═══════════════════════════════════════════════════════════════════════
      - name: Checkout OBS Studio source (Windows)
        if: runner.os == 'Windows'
        uses: actions/checkout@v4
        with:
          repository: obsproject/obs-studio
          ref: ${{ env.OBS_VERSION }}
          path: obs-studio
          fetch-depth: 1
          submodules: false

      - name: Cache obs-deps (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        id: obs-deps-cache
        with:
          path: obs-deps
          key: obs-deps-${{ env.OBS_DEPS_VERSION }}-x64-windows

      - name: Download obs-deps (Windows)
        if: runner.os == 'Windows' && steps.obs-deps-cache.outputs.cache-hit != 'true'
        run: |
          $ver = "${{ env.OBS_DEPS_VERSION }}"
          $url = "https://github.com/obsproject/obs-deps/releases/download/${ver}/windows-deps-${ver}-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile obs-deps.zip
          Expand-Archive -Path obs-deps.zip -DestinationPath "$PWD"
          $dir = (Get-ChildItem -Filter "windows-deps-*" -Directory | Select-Object -First 1).FullName
          Move-Item $dir obs-deps
        shell: pwsh

      - name: Cache OBS build (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        id: obs-cache-win
        with:
          path: |
            obs-build
            obs-install
          key: obs-${{ env.OBS_VERSION }}-deps-${{ env.OBS_DEPS_VERSION }}-windows-libobs

      - name: Build libobs (Windows)
        if: runner.os == 'Windows' && steps.obs-cache-win.outputs.cache-hit != 'true'
        run: |
          $deps = "$PWD\obs-deps"
          cmake -B obs-build -S obs-studio `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="${deps};${deps}\bin" `
            -DENABLE_BROWSER=OFF `
            -DENABLE_WEBSOCKET=OFF `
            -DENABLE_UI=OFF `
            -DENABLE_SCRIPTING=OFF `
            -DENABLE_VLC=OFF `
            -DENABLE_PLUGINS=OFF `
            -DENABLE_FRONTEND_API=OFF `
            -DENABLE_HEVC=OFF `
            -DENABLE_QSV11=OFF `
            -DENABLE_NVENC=OFF `
            -DENABLE_DECKLINK=OFF `
            -DENABLE_VIRTUALCAM=OFF
          cmake --build obs-build --config Release --target libobs --parallel
          cmake --install obs-build --config Release --prefix obs-install
        shell: pwsh

      - name: Install GTest (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install gtest:x64-windows
        shell: pwsh

      - name: Locate libobs cmake config (Windows)
        if: runner.os == 'Windows'
        run: |
          $cfg = Get-ChildItem -Path obs-install,obs-build -Recurse `
                   -Filter libobsConfig.cmake -ErrorAction SilentlyContinue |
                 Select-Object -First 1
          if ($cfg) {
            echo "LIBOBS_DIR=$($cfg.DirectoryName)" >> $env:GITHUB_ENV
          } else {
            Write-Error "libobsConfig.cmake not found"
            exit 1
          }
        shell: pwsh

      - name: Configure plugin (Windows)
        if: runner.os == 'Windows'
        run: |
          $deps = "$PWD\obs-deps"
          $vcpkg = if ($env:VCPKG_INSTALLATION_ROOT) { $env:VCPKG_INSTALLATION_ROOT } else { $env:VCPKG_ROOT }
          cmake -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -Dlibobs_DIR="$env:LIBOBS_DIR" `
            -DCMAKE_PREFIX_PATH="${deps};${deps}\bin" `
            -DCMAKE_TOOLCHAIN_FILE="${vcpkg}\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows
        shell: pwsh

      - name: Build plugin (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --parallel
        shell: pwsh

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          $version = $env:GITHUB_REF_NAME
          $pkg = "${{ matrix.artifact }}-${version}"
          New-Item -ItemType Directory -Force "${pkg}\bin\64bit" | Out-Null
          New-Item -ItemType Directory -Force "${pkg}\data\locale" | Out-Null
          Copy-Item "build\Release\SpeechToTelop.dll" "${pkg}\bin\64bit\"
          Copy-Item "data\locale\en-US.ini" "${pkg}\data\locale\"
          Compress-Archive -Path $pkg -DestinationPath "${pkg}.zip"
        shell: pwsh

      # ── Upload artifact ────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.ref_name }}
          path: "*.zip"

  # ─── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          PRERELEASE=""
          [[ "$VERSION" == *-* ]] && PRERELEASE="--prerelease"

          gh release create "$VERSION" *.zip \
            --repo "$GITHUB_REPOSITORY" \
            --title "SpeechToTelop $VERSION" \
            --generate-notes \
            $PRERELEASE \
            --notes "## インストール手順

          ### macOS
          1. \`SpeechToTelop-macOS-arm64-${VERSION}.zip\` をダウンロード
          2. \`bin/SpeechToTelop.dylib\` → \`~/Library/Application Support/obs-studio/plugins/SpeechToTelop/bin/\`
          3. \`data/\` → \`~/Library/Application Support/obs-studio/plugins/SpeechToTelop/data/\`

          ### Windows
          1. \`SpeechToTelop-Windows-x64-${VERSION}.zip\` をダウンロード
          2. \`bin\\64bit\\SpeechToTelop.dll\` → \`%APPDATA%\\obs-studio\\plugins\\SpeechToTelop\\bin\\64bit\\\`
          3. \`data\\\` → \`%APPDATA%\\obs-studio\\plugins\\SpeechToTelop\\data\\\`

          > モデルは初回起動時に自動ダウンロードされます（baseモデル: 約142MB）。"
